<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${titulo})"></head>
<body>
    <nav th:replace="fragments/navbar :: navbar('equipamentos')"></nav>

    <main class="container py-4" data-page="equipamentos-form">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <section class="app-hero mb-4">
                    <div class="app-hero-copy">
                        <span class="badge text-bg-light mb-3" th:text="${modo == 'editar'} ? 'Edicao' : 'Novo registo'">Novo registo</span>
                        <h1 class="display-6 mb-2" th:text="${titulo}">Novo Equipamento</h1>
                        <p class="text-secondary mb-0">
                            A imagem fica guardada no servidor em disco e o equipamento recebe um
                            <code>codigoUnico</code> para uso em QR code.
                        </p>
                    </div>
                    <div class="app-hero-actions">
                        <a class="btn btn-outline-light btn-lg" th:href="@{/equipamentos}">Voltar a lista</a>
                    </div>
                </section>

                <div id="feedback" class="mb-3"></div>

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-lg-5">
                        <form id="equipamentoForm"
                              th:object="${equipamentoForm}"
                              th:action="${modo == 'editar'} ? @{/equipamentos/{id}(id=${equipamento.id})} : @{/equipamentos}"
                              method="post"
                              enctype="multipart/form-data">
                            <input type="hidden" id="maxImagemBytes" value="1048576">
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4">
                                <p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</p>
                            </div>
                            <div class="row g-4 g-lg-4">
                                <div class="col-md-6">
                                    <label class="form-label" for="categoria">Categoria</label>
                                    <select class="form-control" id="categoria" th:field="*{categoria}" required>
                                        <option value="">Selecione uma categoria...</option>
                                        <option value="Monitor">Monitor</option>
                                        <option value="Teclado">Teclado</option>
                                        <option value="Mouse">Mouse</option>
                                    </select>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="modelo">Modelo</label>
                                    <input type="text" class="form-control" id="modelo" th:field="*{modelo}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('modelo')}" th:errors="*{modelo}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="marca">Marca</label>
                                    <input type="text" class="form-control" id="marca" th:field="*{marca}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('marca')}" th:errors="*{marca}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="numeroSerie">Numero de serie</label>
                                    <input type="number" class="form-control" id="numeroSerie" th:field="*{numeroSerie}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="local">Local</label>
                                    <input type="text" class="form-control" id="local" th:field="*{local}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('local')}" th:errors="*{local}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="dataCompra">Data de compra</label>
                                    <input type="date" class="form-control" id="dataCompra" th:field="*{dataCompra}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="imagem">Imagem do equipamento</label>
                                    <input type="file" class="form-control" id="imagem" th:field="*{imagem}"
                                           accept="image/*" capture="environment">
                                    <div class="form-text">
                                        No telemovel, podes tirar a foto na hora. Em desktop, podes escolher um ficheiro de imagem.
                                    </div>
                                    <img id="novaImagemPreview" class="equipamento-preview d-none mt-3" alt="Preview da nova imagem">
                                </div>
                                <div class="col-md-6" th:if="${equipamento != null and equipamento.imagemPath != null}">
                                    <label class="form-label d-block">Imagem atual</label>
                                    <img class="equipamento-preview" th:src="@{'/uploads/' + ${equipamento.imagemPath}}" alt="Imagem atual do equipamento">
                                </div>
                                <div class="col-md-6" th:if="${equipamento != null}">
                                    <label class="form-label d-block">Codigo unico</label>
                                    <div class="qr-code-label" th:text="${equipamento.codigoUnico}">uuid</div>
                                </div>
                                <div class="col-md-12 form-section-divider">
                                    <label class="form-label" for="adminApiKey">Chave de administrador</label>
                                    <input type="password" class="form-control" id="adminApiKey" th:field="*{adminApiKey}"
                                           placeholder="Obrigatoria para criar ou atualizar">
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('adminApiKey')}" th:errors="*{adminApiKey}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="garantia" th:field="*{garantia}">
                                        <label class="form-check-label" for="garantia">Garantia ativa</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="seguro" th:field="*{seguro}">
                                        <label class="form-check-label" for="seguro">Seguro ativo</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions mt-5">
                                <button type="submit" class="btn btn-primary px-4" th:text="${modo == 'editar'} ? 'Atualizar' : 'Guardar'">Guardar</button>
                                <a class="btn btn-outline-secondary px-4" th:href="@{/equipamentos}">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div th:replace="fragments/scripts :: scripts(${pageScript})"></div>
</body>
</html>
