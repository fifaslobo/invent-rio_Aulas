<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${titulo})"></head>
<body>
    <nav th:replace="fragments/navbar :: navbar('fornecedores')"></nav>

    <main class="container py-4" data-page="fornecedores-form">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <section class="app-hero mb-4">
                    <div class="app-hero-copy">
                        <span class="badge text-bg-light mb-3" th:text="${modo == 'editar'} ? 'Edicao' : 'Novo registo'">Novo registo</span>
                        <h1 class="display-6 mb-2" th:text="${titulo}">Novo Fornecedor</h1>
                        <p class="text-secondary mb-0">
                            A imagem fica guardada no servidor em disco e o fornecedor recebe um
                            <code>codigoUnico</code> para uso em QR code.
                        </p>
                    </div>
                    <div class="app-hero-actions">
                        <a class="btn btn-outline-light btn-lg" th:href="@{/fornecedores}">Voltar a lista</a>
                    </div>
                </section>

                <div id="feedback" class="mb-3"></div>

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-lg-5">
                        <form id="FornecedorForm"
                              th:object="${fornecedor}"
                              th:action="${modo == 'editar'} ? @{/fornecedores/{id}(id=${fornecedor.id})} : @{/fornecedores}"
                              method="post"
                              enctype="multipart/form-data">
                            <input type="hidden" id="maxImagemBytes" value="1048576">
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4">
                                <p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</p>
                            </div>
                            <div class="row g-4 g-lg-4">
                                <div class="col-md-6">
                                    <label class="form-label" for="nome">Nome</label>
                                    <input type="text" class="form-control" id="nome" th:field="*{nome}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="morada">Morada</label>
                                    <input type="text" class="form-control" id="morada" th:field="*{morada}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('morada')}" th:errors="*{morada}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="localidade">Localidade</label>
                                    <input type="text" class="form-control" id="localidade" th:field="*{localidade}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('localidade')}" th:errors="*{localidade}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="email">email </label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="local">Local</label>
                                    <input type="text" class="form-control" id="local" th:field="*{local}" maxlength="25" required>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('local')}" th:errors="*{local}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="site">site</label>
                                    <input type="date" class="form-control" id="site" th:field="*{site}">
                                </div>
                                                                <div class="col-md-6">
                                    <label class="form-label" for="telemovel">telemovel</label>
                                    <input type="date" class="form-control" id="telemovel" th:field="*{telemovel}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="imagem">Imagem do fornecedor</label>
                                    <input type="file" class="form-control" id="imagem" th:field="*{imagem}"
                                           accept="image/*" capture="environment">
                                    <div class="form-text">
                                        No telemovel, podes tirar a foto na hora. Em desktop, podes escolher um ficheiro de imagem.
                                    </div>
                                    <img id="novaImagemPreview" class="fornecedor-preview d-none mt-3" alt="Preview da nova imagem">
                                </div>
                                <div class="col-md-6" th:if="${fornecedor != null and fornecedor.imagemPath != null}">
                                    <label class="form-label d-block">Imagem atual</label>
                                    <img class="fornecedor-preview" th:src="@{'/uploads/' + ${fornecedor.imagemPath}}" alt="Imagem atual do fornecedor">
                                </div>
                                <div class="col-md-6" th:if="${fornecedor != null}">
                                    <label class="form-label d-block">Codigo unico</label>
                                    <div class="qr-code-label" th:text="${fornecedor.codigoUnico}">uuid</div>
                                </div>
                                <div class="col-md-12 form-section-divider">
                                    <label class="form-label" for="adminApiKey">Chave de administrador</label>
                                    <input type="password" class="form-control" id="adminApiKey" th:field="*{adminApiKey}"
                                           placeholder="Obrigatoria para criar ou atualizar">
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('adminApiKey')}" th:errors="*{adminApiKey}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="garantia" th:field="*{garantia}">
                                        <label class="form-check-label" for="garantia">Garantia ativa</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="seguro" th:field="*{seguro}">
                                        <label class="form-check-label" for="seguro">Seguro ativo</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions mt-5">
                                <button type="submit" class="btn btn-primary px-4" th:text="${modo == 'editar'} ? 'Atualizar' : 'Guardar'">Guardar</button>
                                <a class="btn btn-outline-secondary px-4" th:href="@{/fornecedores}">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div th:replace="fragments/scripts :: scripts(${pageScript})"></div>
</body>
</html>
