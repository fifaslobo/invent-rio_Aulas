server.port=8080

# SQLite file (relative to project root)
spring.datasource.url=jdbc:sqlite:./data/todos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


# Custom SQLite Dialect compatible with Hibernate 5.4.x (Spring Boot 2.3.x)
spring.jpa.database-platform=com.starterkit.springboot.config.SQLiteDialect


# Logs do filter de requests (vai para o terminal)
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# API keys (substitui pelos teus valores)
security.api-key.read=**********************************************

security.api-key.admin=**********************************************

# Pasta local para imagens dos equipamentos
app.upload-dir=./uploads

# Uploads de imagens
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
